# ~/.config/gocurl/presets.toml
#
# A preset is matched automatically when the request URL starts with `base`.
# If no preset matches, [default] is used.
#
# Preset values (low → high priority):
#   [default] → matched preset → CLI flags

# ---------------------------------------------------------------------------
# [default] — fallback applied to every request
# ---------------------------------------------------------------------------
[default]
timeout      = 10
http_version = 1      # 1, 2, or 3
scheme       = "https"

[default.colors]
status_2xx = "00c853"
status_4xx = "ffab00"
status_5xx = "ff1744"
headers    = "888888"
body       = "61dafb"
elapsed    = "555555"

# [default.query]
# page = 1

# ---------------------------------------------------------------------------
# GitHub API
# ---------------------------------------------------------------------------
# [github]
# base         = "https://api.github.com"
# http_version = 2
#
# [github.headers]
# Authorization = "Bearer $GITHUB_TOKEN"
# Accept        = "application/vnd.github+json"

# ---------------------------------------------------------------------------
# Local dev server
# ---------------------------------------------------------------------------
# [local]
# base   = "http://localhost:8080"
# scheme = "http"
#
# [local.headers]
# X-Dev-Token = "dev-secret"
#
# [local.query]
# version = 3
